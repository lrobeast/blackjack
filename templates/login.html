<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackjack — Connexion</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">
  <div class="login-box">
    <div class="logo">🃏</div>
    <h1>BLACKJACK</h1>
    <p class="subtitle">Entre ton pseudo pour rejoindre la table</p>
    <form method="POST">
      
    <input type="text" name="username" placeholder="Ton pseudo" maxlength="20" autofocus autocomplete="off">
      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
      <button type="submit">Rejoindre la table</button>
    </form>
  </div>
</body>
</html>
