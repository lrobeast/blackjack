<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackjack 🃏</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="game-page">

  <header>
    <div class="header-left">
      <span class="logo-small">🃏 BLACKJACK</span>
    </div>
    <div class="header-center">
      <span id="balance-display">💰 10 000€</span>
    </div>
    <div class="header-right">
      <span id="player-name">{{ username }}</span>
      <button class="leave-btn" onclick="leaveTable()">🚪 Quitter</button>
    </div>
  </header>

  <main>

    <!-- ZONE CROUPIER -->
    <section class="dealer-zone">
      <h2>Croupier <span id="dealer-value" class="value-badge"></span></h2>
      <div id="dealer-hand" class="hand"></div>
      <!-- Preview next card (master only) -->
      <div id="dealer-next-wrap" class="next-card-wrap hidden">
        <span class="next-label">↳ prochain tirage</span>
        <div id="dealer-next-hand" class="hand next-hand"></div>
      </div>
    </section>

    <!-- PHASE MESSAGES -->
    <div id="phase-banner" class="phase-banner"></div>

    <!-- TIMER -->
    <div id="timer-bar-wrap" class="timer-wrap hidden">
      <div id="timer-bar" class="timer-bar"></div>
      <span id="timer-text">15</span>
    </div>

    <!-- ZONE JOUEURS -->
    <section id="players-zone" class="players-zone"></section>

    <!-- ZONE JOUEUR LOCAL -->
    <section class="my-zone">
      <h2>Ta main <span id="my-value" class="value-badge"></span></h2>
      <div id="my-hand" class="hand"></div>
      <!-- Preview next card (master only) -->
      <div id="my-next-wrap" class="next-card-wrap hidden">
        <span class="next-label">↳ prochain tirage</span>
        <div id="my-next-hand" class="hand next-hand"></div>
      </div>

      <!-- Actions -->
      <div id="actions" class="actions hidden">
        <div id="bet-actions" class="hidden">
          <p>Ta mise :</p>
          <div class="bet-chips">
            <button class="chip" onclick="placeBet(50)">50€</button>
            <button class="chip" onclick="placeBet(100)">100€</button>
            <button class="chip" onclick="placeBet(250)">250€</button>
            <button class="chip" onclick="placeBet(500)">500€</button>
            <button class="chip chip-big" onclick="placeBet(1000)">1 000€</button>
          </div>
          <div class="custom-bet">
            <input type="text" id="custom-amount" placeholder="Montant custom" autocomplete="off">
            <button onclick="placeCustomBet()">Miser</button>
          </div>
        </div>
        <div id="play-actions" class="hidden">
          <button class="btn-hit" onclick="hit()">TIRER 🎴</button>
          <button class="btn-stand" onclick="stand()">RESTER ✋</button>
        </div>
      </div>

      <!-- Bouton démarrer -->
      <div id="start-zone" class="hidden">
        <button class="btn-start" onclick="joinAndStart()">Démarrer une partie</button>
      </div>

      <!-- Bouton rejoindre la manche -->
      <div id="join-round-zone" class="hidden">
        <button class="btn-start" onclick="joinRound()">✋ Rejoindre cette manche</button>
      </div>

      <!-- Bouton nouvelle manche -->
      <div id="new-round-zone" class="hidden">
        <button class="btn-start" onclick="newRound()">Nouvelle manche 🔄</button>
      </div>
    </section>

    <!-- PANNEAU MASTER (caché pour les joueurs normaux) -->
    <section id="master-panel" class="master-panel hidden">
      <div class="master-header">👁️ PANNEAU MAÎTRE — <span id="master-mode-label">Mode normal</span></div>
      <div class="master-actions">
        <button class="master-btn master-btn-gold" onclick="masterForceBlackjack()">
          ⚡ Forcer Blackjack
          <small>Prochain deal = BJ assuré</small>
        </button>
        <button class="master-btn master-btn-green" onclick="masterNormal()">
          ✅ Mode normal
          <small>Désactiver les pouvoirs</small>
        </button>
        <button class="master-btn master-btn-red" onclick="masterReset()">
          🔴 Reset total
          <small>Table + wallets à zéro</small>
        </button>
      </div>
    </section>

    <!-- RÉSULTATS -->
    <div id="results-overlay" class="results-overlay hidden">
      <div class="results-box">
        <h2>Résultats</h2>
        <div id="results-content"></div>
        <button onclick="closeResults()">Fermer</button>
      </div>
    </div>

    <!-- LEADERBOARD -->
    <section class="leaderboard">
      <h3>🏆 Classement</h3>
      <div id="leaderboard-list"></div>
    </section>

  </main>

  <script src="/static/js/game.js"></script>
</body>
</html>
